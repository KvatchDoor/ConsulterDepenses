name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'consulter-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'consulter-backend/**'
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        cd consulter-backend
        mvn clean package -DskipTests

    - name: Run tests
      run: |
        cd consulter-backend
        mvn test

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: consulter-backend/target/

    - name: Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: consulter-backend/target/surefire-reports/

