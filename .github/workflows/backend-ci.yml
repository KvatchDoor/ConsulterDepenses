name: Backend CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build, test and generate coverage
      run: |
        cd consulter-backend
        mvn clean verify -ntp

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      with:
        args: >
          -Dsonar.sources=consulter-backend/src/main
          -Dsonar.tests=consulter-backend/src/test
          -Dsonar.java.binaries=consulter-backend/target/classes
          -Dsonar.coverage.jacoco.xmlReportPaths=consulter-backend/target/site/jacoco/jacoco.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: consulter-backend/target/

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: consulter-backend/target/surefire-reports/

