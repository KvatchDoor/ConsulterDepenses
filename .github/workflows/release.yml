name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  GITHUB_OWNER: ${{ github.repository_owner }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      jar-filename: ${{ steps.jar-filename.outputs.filename }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: |
          cd consulter-backend
          mvn clean package -DskipTests

      - name: Get JAR filename
        id: jar-filename
        run: |
          JAR_FILE=$(ls consulter-backend/target/*.jar | xargs basename)
          echo "filename=$JAR_FILE" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./consulter-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-backend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: consulter-backend/target/*.jar
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      dist-path: consulter-frontend-dist

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'consulter-frontend/package-lock.json'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          cd consulter-frontend
          npm ci

      - name: Build frontend
        run: |
          cd consulter-frontend
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./consulter-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compress frontend dist
        run: |
          cd consulter-frontend
          zip -r ../consulter-frontend-dist.zip dist/

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: consulter-frontend-dist.zip
          retention-days: 1

  create-release:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./artifacts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            # Release ${{ steps.version.outputs.VERSION }}

            ## Docker Images
            - Backend: `${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-backend:${{ steps.version.outputs.VERSION }}`
            - Frontend: `${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-frontend:${{ steps.version.outputs.VERSION }}`

            ## Artifacts
            - Backend JAR: `consulter-backend-*.jar`
            - Frontend dist: `consulter-frontend-dist.zip`

            ## Pull Images
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-backend:${{ steps.version.outputs.VERSION }}
            docker pull ${{ env.REGISTRY }}/${{ env.GITHUB_OWNER }}/consulter-frontend:${{ steps.version.outputs.VERSION }}
            ```
          files: ./artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
