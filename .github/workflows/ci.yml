name: Full CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    name: Backend Build & Test

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        cd consulter-backend
        mvn clean package

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: consulter-backend/target/*.jar

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build & Test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'consulter-frontend/package-lock.json'

    - name: Install dependencies
      run: |
        cd consulter-frontend
        npm ci

    - name: Build
      run: |
        cd consulter-frontend
        npm run build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: consulter-frontend/dist/

