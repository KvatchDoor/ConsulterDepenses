name: Frontend CI

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'consulter-frontend/package-lock.json'

    - name: Install dependencies
      run: |
        cd consulter-frontend
        npm ci

    - name: Lint
      run: |
        cd consulter-frontend
        npm run lint --if-present

    - name: Build
      run: |
        cd consulter-frontend
        npm run build

    - name: Run tests
      run: |
        cd consulter-frontend
        npm test -- --watch=false --browsers=chromium

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      with:
        args: >
          -Dsonar.sources=consulter-frontend/src
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: consulter-frontend/dist/

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-test-results
        path: consulter-frontend/coverage/

